name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Format Check
        run: bun run format:check

      - name: Lint Check
        run: bun run lint

      - name: Type Check
        run: bun x tsc --noEmit

      - name: Run Tests
        run: bun test
